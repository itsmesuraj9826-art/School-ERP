{% extends 'base.html' %}
{% block title %}Add Notice — Admin{% endblock %}
{% block page_title %}Publish Notice{% endblock %}

{% block content %}
<div class="dashboard-content">
    <div class="page-header-row">
        <div>
            <h5 class="page-sub-title">New Announcement</h5>
        </div>
        <a href="{{ url_for('admin.notices') }}" class="btn btn-outline-secondary btn-action">
            <i class="fas fa-arrow-left me-2"></i>Back
        </a>
    </div>
    <div class="info-card">
        <form method="POST" action="{{ url_for('admin.add_notice') }}">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Notice Title *</label>
                    <input type="text" name="title" class="form-control form-control-lg" placeholder="Enter notice title..." required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Target Audience</label>
                    <select name="target_role" class="form-select">
                        <option value="all">All (Students, Teachers, Parents)</option>
                        <option value="student">Students Only</option>
                        <option value="teacher">Teachers Only</option>
                        <option value="parent">Parents Only</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="normal">Normal</option>
                        <option value="low">Low</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Expiry Date</label>
                    <input type="date" name="expiry_date" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Notice Content *</label>
                    <textarea name="content" class="form-control" rows="8" placeholder="Write the notice content here..." required></textarea>
                </div>
                <div class="col-12">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="email_broadcast" id="emailBroadcast">
                        <label class="form-check-label" for="emailBroadcast">
                            <i class="fas fa-envelope me-1 text-primary"></i>
                            Also email this notice to all parents
                            <small class="text-muted">(requires working email configuration)</small>
                        </label>
                    </div>
                </div>
                <div class="col-12 d-flex gap-3">
                    <button type="submit" class="btn btn-primary btn-action">
                        <i class="fas fa-bullhorn me-2"></i>Publish Notice
                    </button>
                    <a href="{{ url_for('admin.notices') }}" class="btn btn-outline-secondary btn-action">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
