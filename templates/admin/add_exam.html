{% extends 'base.html' %}
{% block title %}Schedule Exam — ERP{% endblock %}
{% block page_title %}Schedule New Exam{% endblock %}

{% block content %}
<div class="dashboard-content">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="info-card">
                <div class="card-head">
                    <h6 class="card-head-title"><i class="fas fa-file-alt me-2 text-primary"></i>New Examination</h6>
                    <a href="{{ url_for('admin.exams') }}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="p-4">
                    <form method="POST" action="{{ url_for('admin.add_exam') }}">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Exam Name *</label>
                                <input type="text" name="name" class="form-control" required
                                    placeholder="e.g. Unit Test 1 — Physics, First Terminal Exam…">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Exam Type *</label>
                                <select name="exam_type" class="form-select" required>
                                    {% for val, label in exam_types %}
                                    <option value="{{ val }}">{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Exam Date</label>
                                <input type="date" name="exam_date" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Class</label>
                                <select name="class_id" class="form-select" id="classSelect">
                                    <option value="">All Classes / Common</option>
                                    {% for cls in classes %}
                                    <option value="{{ cls.id }}">{{ cls.full_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Subject</label>
                                <select name="subject_id" class="form-select" id="subjectSelect">
                                    <option value="">All Subjects / General</option>
                                    {% for subj in subjects %}
                                    <option value="{{ subj.id }}">{{ subj.name }} ({{ subj.class_ref.full_name if subj.class_ref else 'General' }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Maximum Marks</label>
                                <input type="number" name="max_marks" class="form-control" value="100" min="1" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Pass Marks</label>
                                <input type="number" name="pass_marks" class="form-control" value="40" min="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Academic Year</label>
                                <input type="text" name="academic_year" class="form-control" value="2081-2082">
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-primary-custom px-5">
                                <i class="fas fa-save me-2"></i>Schedule Exam
                            </button>
                            <a href="{{ url_for('admin.exams') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
